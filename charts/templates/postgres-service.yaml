apiVersion: v1
kind: Service
metadata:
  name: {{ include "fastapiapp.fullname" . }}-db
  labels:
    {{- include "fastapiapp.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: {{ include "fastapiapp.fullname" . }}-db